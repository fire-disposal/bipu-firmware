name: Build & Merge Firmware

on:
  push:
    # 仅在推送以 v 开头的标签时触发（如 v1.0, v2.1.3-beta）
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: Build for ESP32-C3
    runs-on: ubuntu-latest
    # 使用 Espressif 官方 Docker 镜像，环境更稳定
    container: espressif/idf:v5.5.2

    steps:
      # ========= 1️⃣ Checkout =========
      - name: Checkout Repo
        uses: actions/checkout@v4
        with:
          submodules: "recursive"
          fetch-depth: 0 # 必须设置为 0 才能获取完整的提交历史用于生成总结

      # ========= 2️⃣ 配置 Git 安全目录 =========
      - name: Configure Git Safe Directory
        shell: bash
        run: |
          # 解决 Git 2.35+ 的安全目录检测问题
          git config --global --add safe.directory "$GITHUB_WORKSPACE"
          git config --global --add safe.directory "*"

      # ========= 3️⃣ 编译与合并 =========
      - name: Build and Merge Firmware
        shell: bash
        run: |
          . $IDF_PATH/export.sh
          rm -f sdkconfig
          idf.py set-target esp32c3
          idf.py build
          idf.py merge-bin

      # ========= 4️⃣ 准备产物与版本号 =========
      - name: Prepare Artifacts
        id: prep
        shell: bash
        run: |
          # 获取当前 Tag 名
          VERSION=${GITHUB_REF#refs/tags/}
          DATETIME=$(TZ='Asia/Shanghai' date +'%Y%m%d_%H%M')
          SHORT_SHA=$(echo ${{ github.sha }} | cut -c1-7)

          # 定义固件文件名：项目名_版本号_时间_哈希.bin
          FINAL_NAME="firmware_${VERSION}_${DATETIME}_${SHORT_SHA}.bin"

          if [ -f "build/merged-binary.bin" ]; then
            cp build/merged-binary.bin "$FINAL_NAME"
            echo "version=$VERSION" >> "$GITHUB_OUTPUT"
            echo "upload_name=$FINAL_NAME" >> "$GITHUB_OUTPUT"
          else
            echo "::error::Merged binary not found!"
            exit 1
          fi

      # ========= 5️⃣ 自动提取提交日志 (Comment 总结) =========
      - name: Generate Release Body
        id: changelog
        shell: bash
        run: |
          # 获取当前 tag 与上一个 tag 之间的所有 commit 摘要
          # 如果是第一个 tag，则获取所有历史记录
          PREV_TAG=$(git describe --tags --abbrev=0 ${{ github.ref }}^ 2>/dev/null || echo "")

          echo "### 🛠 固件更新说明" > release_body.md
          echo "- **触发版本**: ${{ steps.prep.outputs.version }}" >> release_body.md
          echo "- **编译时间**: $(TZ='Asia/Shanghai' date +'%Y-%m-%d %H:%M:%S') (CST)" >> release_body.md
          echo "" >> release_body.md
          echo "#### 📝 变更摘要 (Recent Commits):" >> release_body.md

          if [ -z "$PREV_TAG" ]; then
            git log --pretty=format:"- %s ([%h](${{ github.server_url }}/${{ github.repository }}/commit/%H))" -n 10 >> release_body.md
          else
            git log ${PREV_TAG}..${{ github.ref }} --pretty=format:"- %s ([%h](${{ github.server_url }}/${{ github.repository }}/commit/%H))" >> release_body.md
          fi

      # ========= 6️⃣ 发布 Release =========
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.prep.outputs.version }}
          name: "Release ${{ steps.prep.outputs.version }}"
          body_path: release_body.md
          files: |
            ${{ steps.prep.outputs.upload_name }}
          # 正式发布设为 false，如果是测试版本可以改为 true
          prerelease: false
          generate_release_notes: false # 我们已经手动生成了更精简的 body
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
